<div class="min-h-screen bg-gray-100 dark:bg-gray-900 p-4">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Kanban Board</h1>
    <button (click)="toggleTheme()" class="p-2 rounded-lg bg-blue-500 hover:bg-blue-600 text-white">
      {{ isDarkMode ? "Light" : "Dark" }} Mode
    </button>
  </div>

  <div class="flex gap-4 overflow-x-auto pb-4" cdkDropListGroup>
    <div *ngFor="let column of columns" class="min-w-[300px] bg-white dark:bg-gray-800 rounded-lg shadow-lg">
      <div class="p-4 border-b border-gray-200 dark:border-gray-700">
        <div class="flex justify-between items-center">
          <input *ngIf="column.isEditing" [(ngModel)]="column.title" (blur)="saveColumnTitle(column)" class="border rounded px-2 py-1 w-full mr-2" />
          <h2 *ngIf="!column.isEditing" class="font-semibold text-gray-700 dark:text-gray-200">{{column.title}} ({{column.tasks.length}})</h2>
          <div class="flex gap-2">
            <button (click)="column.isEditing = true" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">
              <i class="pi pi-pencil"></i>
            </button>
            <button *ngIf="!column.isDefault" (click)="deleteColumn(column)" class="text-red-500 hover:text-red-700">
              <i class="pi pi-trash"></i>
            </button>
          </div>
        </div>
      </div>

      <div cdkDropList [cdkDropListData]="column.tasks" (cdkDropListDropped)="drop($event)" class="p-4 min-h-[200px]">
        <div *ngFor="let task of column.tasks" cdkDrag class="mb-3 bg-white dark:bg-gray-700 rounded-lg shadow p-4 cursor-move hover:shadow-lg transition-shadow">
          <div class="flex justify-between items-start mb-2">
            <h3 class="font-medium text-gray-800 dark:text-white">{{task.title}}</h3>
            <div class="flex gap-2">
              <button (click)="editTask(task)" class="text-blue-500 hover:text-blue-700">
                <i class="pi pi-pencil"></i>
              </button>
              <button (click)="deleteTask(task, column)" class="text-red-500 hover:text-red-700">
                <i class="pi pi-trash"></i>
              </button>
            </div>
          </div>
          <p class="text-sm text-gray-600 dark:text-gray-300 mb-2">{{task.description}}</p>
          <div class="flex flex-wrap gap-2 mb-2">
            <span [ngClass]="getPriorityClass(task.priority)" class="text-xs px-2 py-1 rounded">
              {{task.priority}}
            </span>
            <span class="bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-200 text-xs px-2 py-1 rounded">
              Due: {{task.dueDate | date:'shortDate'}}
            </span>
          </div>
          <div class="flex items-center gap-2">
            <img [src]="task.assignee.avatar" alt="Assignee" class="w-3 h-12 rounded-full" />
            <span class="text-sm text-gray-600 dark:text-gray-300">{{task.assignee.name}}</span>
          </div>
        </div>
      </div>

      <div class="p-4 border-t border-gray-200 dark:border-gray-700">
        <button (click)="addTask(column)" class="w-full py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition-colors">
          Add Task
        </button>
      </div>
    </div>

    <div class="min-w-[300px]">
      <button (click)="addColumn()" class="w-full h-full min-h-[200px] rounded-lg border-2 border-dashed border-gray-300 dark:border-gray-700 hover:border-blue-500 dark:hover:border-blue-400 transition-colors flex items-center justify-center">
        <span class="text-gray-500 dark:text-gray-400">Add Column</span>
      </button>
    </div>
  </div>

  <!-- Task Modal -->
  <div *ngIf="selectedTask" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
    <div class="bg-white dark:bg-gray-800 rounded-lg p-6 w-full max-w-md">
      <h2 class="text-xl font-bold mb-4 text-gray-800 dark:text-white">{{selectedTask.id ? 'Edit' : 'New'}} Task</h2>
      <form (ngSubmit)="saveTask()" #taskForm="ngForm">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Title</label>
          <input [(ngModel)]="selectedTask.title" name="title" required class="w-full border rounded-lg px-3 py-2 dark:bg-gray-700 dark:border-gray-600" />
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description</label>
          <textarea [(ngModel)]="selectedTask.description" name="description" rows="3" class="w-full border rounded-lg px-3 py-2 dark:bg-gray-700 dark:border-gray-600"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Priority</label>
            <select [(ngModel)]="selectedTask.priority" name="priority" class="w-full border rounded-lg px-3 py-2 dark:bg-gray-700 dark:border-gray-600">
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Due Date</label>
            <input type="date" [(ngModel)]="selectedTask.dueDate" name="dueDate" class="w-full border rounded-lg px-3 py-2 dark:bg-gray-700 dark:border-gray-600" />
          </div>
        </div>
        <div class="flex justify-end gap-2">
          <button type="button" (click)="closeTaskModal()" class="px-4 py-2 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">Cancel</button>
          <button type="submit" [disabled]="!taskForm.form.valid" class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg disabled:opacity-50">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
