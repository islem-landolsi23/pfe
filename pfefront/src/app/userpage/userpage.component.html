<div class="flex justify-content-center mt-5">
    <p-card class="w-11 shadow-4">
        <div class="flex flex-column align-items-center gap-3">
            <p-panel [toggleable]="true" class="w-full  h-full">
                <ng-template #header>
                    <div class="flex align-items-center gap-3">
                        <p-avatar [image]="avatar_url" shape="circle"></p-avatar>
                        <span class="font-bold">{{ user.name }}</span>
                    </div>
                </ng-template>

                <ng-template #icons>
                    <p-button icon="pi pi-cog" severity="secondary" rounded text />
                </ng-template>
                <!--                          first panel                           -->
                <div class="mt-4 flex flex-column justify-content-center">
                    <input pInputText placeholder="UserName" class="w-40rem" value="{{ user.name }}" />
                    <br>
                    <input pInputText placeholder="email" class="w-40rem" value="{{ user.email }}" />
                    <br>
                  
            
                <p-fluid>
                      <p-floatLabel>

                        <p-password [(ngModel)]="password" [feedback]="false" value="changeMe"/>
    <label for="password">Password</label>
</p-floatLabel>
                </p-fluid>


                </div>
            </p-panel>
            <p-panel [toggleable]="true" class="w-full h-full">
                <ng-template #header>
                    <div class="flex align-items-center gap-3">
                        Projects
                    </div>
                </ng-template>

                <ng-template #icons>
                    <p-button icon="pi pi-cog" severity="secondary" rounded text />
                </ng-template>
                <!--                          seconde panel                           -->
                <label for=""> Project : </label> porjeycmo
                <p-divider />
                <p>
                    <label for=""> Project :</label> lolo wow
                </p>
                <p-divider />
                <label for=""> Project :</label> kiki gio

            </p-panel>
        </div>
        <br>
        <button 
    pButton 
    pRipple 
    label="Save" 
    class="p-button-success"
    (click)="saveUser()">
</button>
    </p-card>
</div>
