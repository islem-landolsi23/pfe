<div class="container mx-auto px-4">
  <!-- ... -->

  <div class="surface-card p-5 shadow-3 border-round-xl w-full max-w-10xl mx-auto mt-4">

    <h2 class="text-2xl font-semibold mb-5 text-primary">Projects</h2>


    <div class="card">


      <p-table #dt [value]="projects" [paginator]="true" [rows]="5" [tableStyle]="{ 'min-width': '50rem' }"
        [rowsPerPageOptions]="[5, 10, 20]" [globalFilterFields]="['name', 'discription', 'startDate', 'endDate']">
        <!-- <ng-template #caption>
            <div class="flex justify-between">
                <p-button [outlined]="true" icon="pi pi-filter-slash" label="Clear" (click)="clear(dt)" />
                <p-iconField iconPosition="left">
                    <p-inputIcon>
                        <i class="pi pi-search"></i>
                    </p-inputIcon>
                    <input pInputText type="text" [(ngModel)]="searchValue" (input)="onGlobalFilter($event, dt)"
                    placeholder="Keyboard Search" />


                </p-iconField>
            </div>
             <div class="flex left">

                 <p-button label="Messages" icon="pi pi-users" ></p-button>
             </div>
          
        </ng-template> -->

        <ng-template #caption>
          <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">

            <!-- Left side -->
            <div style="display: flex; align-items: center; gap: 1rem;">
              <p-button [outlined]="true" icon="pi pi-filter-slash" label="Clear" (click)="clear(dt)" />
              <p-iconField iconPosition="left">
                <p-inputIcon>
                  <i class="pi pi-search"></i>
                </p-inputIcon>
                <input pInputText type="text" [(ngModel)]="searchValue" (input)="onGlobalFilter($event, dt)"
                  placeholder="Keyboard Search" />
              </p-iconField>
            </div>

            <!-- Right side: pushed to far right -->
            <div>
              <div class="card flex justify-center">
                <p-drawer [(visible)]="visible" position="right" [style]="{width: '30rem'}">
                  <ng-template #header>
                    <div class="flex items-center gap-2 p-3 border-bottom-1 surface-border">
                      <i class="pi pi-folder-open text-primary text-xl"></i>
                      <span class="font-medium text-xl">Add Project</span>
                    </div>
                  </ng-template>

                  <div class="p-4">
                    <form [formGroup]="projectForm" class="flex flex-column gap-4 p-fluid">
                      <div>
                        <label for="name" class="block mb-2 text-sm font-semibold">Project Name</label>
                        <input id="name" type="text" pInputText formControlName="name"
                          placeholder="Enter project name" />
                      </div>

                      <div>
                        <label for="description" class="block mb-2 text-sm font-semibold">Description</label>
                        <textarea id="description" rows="4" pTextarea formControlName="description"
                          placeholder="Project description"></textarea>
                      </div>

                      <div class="grid grid-cols-2 gap-3">
                        <div>
                          <label for="startDate" class="block mb-2 text-sm font-semibold">Start Date</label>
                          <p-datepicker id="startDate" formControlName="startDate" [showIcon]="true"
                            placeholder="Start Date"></p-datepicker>
                        </div>
                        <div>
                          <label for="endDate" class="block mb-2 text-sm font-semibold">End Date</label>
                          <p-datepicker id="endDate" formControlName="endDate" [showIcon]="true"
                            placeholder="End Date"></p-datepicker>
                        </div>
                      </div>
                    </form>
                  </div>

                  <ng-template #footer>
                    <div class="p-3 border-top-1 surface-border flex justify-end gap-2">
                      <button pButton type="button" label="Cancel" class="p-button-secondary"
                        (click)="visible = false"></button>
                      <button pButton type="button" label="Save" icon="pi pi-check" (click)="saveProject()"></button>
                    </div>
                  </ng-template>
                </p-drawer>


                <button pButton (click)="visible = true" icon="pi pi-plus"></button>
              </div>
            </div>

          </div>
        </ng-template>

        <ng-template #header>
          <tr>
            <th style="width:25%">Name</th>
            <th style="width:25%">Discription</th>
            <th style="width:25%">Start date</th>
            <th style="width:25%">End date</th>
          </tr>
        </ng-template>
        <ng-template #body let-p>
          <tr (dblclick)="goTodetails(p)">
            <td>{{ p.name }}</td>
            <td>{{ p.description }}</td>
            <td>{{ p.startDate |date:'shortDate'}}</td>
            <td>{{ p.endDate |date:'shortDate' }}</td>
            <td> <button (click)="showdeletDialog(p.id)">
                <i class="pi pi-trash " style="color: red;"></i>
              </button></td>
          </tr>
        </ng-template>
      </p-table>
    </div>

  </div>
</div>



<p-dialog header="Delete project" [modal]="true" [(visible)]="visibledelete" [style]="{ width: '25rem' }">
  <div class="mb-3">
    are you sure you want to delete this project
  </div>

  <br>
  <div class="flex justify-end gap-4">
    <!-- <p-button label="Cancel" severity="secondary" (click)="visibledelete = false" /> -->
    <p-button label="yes" severity="danger" (click)=" deleteproject(todelete)" />
  </div>
</p-dialog>
