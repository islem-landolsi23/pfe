<div class="flex h-screen bg-gray-100 dark:bg-gray-900">
  <!-- Sidebar -->
  <div class="w-1/6 border-r border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
    <!-- User Profile -->
    <div class="p-4 border-b border-gray-200 dark:border-gray-700">
      <div class="flex items-center space-x-4">
        <img [src]="getImagePath(myImage)" alt="Profile" class="w-3 h-12 rounded-full">
        <div>
          <h2 class="text-lg font-semibold dark:text-white">{{myName}}</h2>
          <div class="flex items-center">
            <span class=" bg-green-500 rounded-full "></span>
            <!-- <span class="text-sm text-gray-600 dark:text-gray-300">Online</span> -->
          </div>
        </div>
      </div>
    </div>

    <!-- Search -->
    <div class="p-4">
      <div class="relative">
        <input type="text" [(ngModel)]="searchQuery" placeholder="Search contacts..."
          class="w-full px-4 py-2 bg-gray-100 dark:bg-gray-700 rounded-lg focus:outline-none dark:text-white">
        <span class="absolute right-3 top-2.5 text-gray-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </span>
      </div>
    </div>

    <!-- Contacts List -->
    <div class="overflow-y-auto">
      <div *ngFor="let contact of filteredContacts" (click)="selectContact(contact)"
        class="p-4 hover:bg-slate-200 dark:hover:bg-slate-700 cursor-pointer"
        [class.bg-slate-300]="selectedContact?.id === contact.id">
        <div class="flex items-center space-x-3">
          <img [src]="getImagePath(contact.avatar)" [alt]="contact.name" class="w-3 h-12 rounded-full">
          <div class="flex-1">
            <h3 class="font-medium dark:text-white">{{contact.name}}</h3>
            <p class="text-sm text-gray-500 dark:text-gray-400">{{contact.lastMessage}}</p>
          </div>
          <div *ngIf="contact.unread" class="bg-blue-500 text-white text-xs rounded-full px-2 py-1">{{contact.unread}}
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Chat -->
  <div class="flex-1 flex flex-col">
    <!-- Chat Header -->
    <div class="p-4 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-4">
          <img [src]="getImagePath(selectedContact?.avatar)" [alt]="selectedContact?.name"
            class="w-4 h-12  rounded-full">
          <div>
            <h2 class="font-semibold dark:text-white whitespace-nowrap">{{selectedContact?.name}}</h2>
            <span class="text-sm text-gray-500 dark:text-gray-400">{{selectedContact?.status}}</span>
          </div>
        </div>
        <div class="flex space-x-4">
          <button class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full" (click)=" openModal()">
            <!-- <svg class="w-12 h-6 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
              -->
            <i class="pi pi-users" style="font-size: 1.5rem"></i>
          </button>
          <button *ngIf="notGroup" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full" (click)="call()">
            <svg class="w-12 h-6 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor"
              viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z">
              </path>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Messages -->
    <div class="flex-1 overflow-y-auto p-4 bg-gray-50 dark:bg-gray-900" #messageContainer>
      <div *ngFor="let message of messages" class="mb-4">
        <div [class]="message.user == userName ? 'flex justify-end' : 'flex justify-start'">
          <div
            [class]="message.user == userName ? 'bg-blue-500 text-white' : 'bg-white dark:bg-gray-800 dark:text-white'"
            class="max-w-xs rounded-lg px-4 py-2 shadow">
            <!--------TEXT --------------->
            <p *ngIf="!message.file_Url">{{message.content}}</p>
            <!-- Image -->
            <img *ngIf="message.fileType === 'image'" [src]="backendurl+message.file_Url"
              class="max-w-full rounded mt-2">
            <!-- Audio -->
            <audio *ngIf="message.fileType === 'audio'" [src]="backendurl+message.file_Url" controls
              class="max-w-full mt-4"></audio>
            <!-- Video -->
            <video *ngIf="message.fileType === 'video'" [src]="backendurl+message.file_Url" controls
              class="max-w-full rounded mt-2"></video>

            <!-- PDF / Other -->
            <a *ngIf="message.fileType === 'pdf' || message.fileType === 'file'" [href]="backendurl + message.file_Url"
              target="_blank" class="underline mt-2 block">
              {{changeFilename(message.file_Url)}} 📄 Download File
            </a>
            <span class="text-xs opacity-75">{{message.timestamp | date:"MMM dd, yyyy : HH:mm"}}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="p-4 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700">
      <div class="flex space-x-4">
        <!-- <button class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full">
          <svg class="w-8 h-8 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
        </button> -->
        <input type="file" (change)="onFileSelected($event)" hidden #fileInput>
        <button (click)="fileInput.click()">📎</button>

        <input type="text" [(ngModel)]="newMessage" (keyup.enter)=" sendMessage()" placeholder="Type your message..."
          class="flex-1 px-4 py-2 bg-gray-100 dark:bg-gray-700 rounded-lg focus:outline-none dark:text-white">
        <button (click)="sendMessage()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full">
          <svg class="w-8 h-8  text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8">
            </path>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>




<div class="fixed inset-0 z-50 flex items-center justify-center" *ngIf="isModalOpen">
  <div class="relative bg-white rounded-lg shadow-xl w-full max-w-md max-h-[70dvh] mx-4 p-4 flex flex-col gap-4">
    <h4 class="text-xl font-semibold text-gray-900">Select Users</h4>
    <input type="text" id="first_name" [(ngModel)]="groupename"
      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
      placeholder="groupe name" required />
    <div class="flex flex-col gap-4 overflow-auto ">
      <ng-content *ngFor="let user of users">
        <div class="flex w-full flex-nowrap items-center gap-4">
          <input type="checkbox" [checked]="user.selected" (change)="toggleSelection(user)" />
          <div class="h-12 overflow-hidden aspect-square rounded-full">
            <img [src]="getImagePath(user.avatar)" [alt]="user.name" (error)="handleImageError($event)"
              class="h-12 aspect-square">
          </div>
          <span class="text-gray-700 flex-1">{{user.email}}</span>
        </div>
      </ng-content>
    </div>
    <div class="flex justify-end gap-4">
      <button (click)="closeModal()"
        class="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg">Close</button>
      <button (click)="saveSelection()"
        class="px-4 py-2 text-white bg-blue-600 hover:bg-blue-700 rounded-lg">Save</button>
    </div>
  </div>
</div>
<p-toast />
