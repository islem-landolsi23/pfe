<div class="flex flex-col items-center justify-start min-h-screen text-center space-y-6 pt-20">
  <!-- Room ID -->
  <p class="text-lg font-mono bg-gray-100 p-3 rounded-lg">
    {{ roomId }}
  </p>

  <!-- Call Section -->
  <div class="call flex flex-col items-center space-y-6">
    <div class="videos flex flex-wrap justify-center gap-6">
      <!-- Local Video -->
      <div class="panel text-center">
        <h4>You</h4>
        <video #localVideo autoplay playsinline muted class="rounded-lg shadow-md"></video>
      </div>

      <!-- Remote Videos -->
      <div class="panel text-center" *ngFor="let id of remoteIds">
        <h4>{{ id }}</h4>
        <video [attr.id]="'remote-'+id" [srcObject]="remoteStreams.get(id) || null" autoplay playsinline
          class="rounded-lg shadow-md"></video>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="bg-red-500 text-white px-6 py-2 rounded-lg shadow" (click)="ngOnDestroy()">
        Leave
      </button>
    </div>
  </div>
</div>
