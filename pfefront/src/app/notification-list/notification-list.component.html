  <div *ngIf="isOpen" [@dropdownAnimation] class="absolute mt-2 right-0  w-90 max-h-96 overflow-y-auto bg-white rounded-lg shadow-xl border border-gray-200 z-50" role="menu">
    <div class="p-4" *ngIf="notifications.length === 0">
      <p class="text-gray-500 text-center">No notifications available</p>
    </div>

    <div class="divide-y divide-gray-100" *ngIf="notifications.length > 0">
      <div *ngFor="let notification of notifications" class="p-3 hover:bg-gray-50 transition duration-150 ease-in-out cursor-pointer" [class.bg-blue-50]="!notification.status">
        <div class="flex items-start space-x-4">
          <p-avatar
                label="i"
                class="mr-2"
               
                shape="circle"
                [ngClass]="getPriorityIconClass(notification.priority)"
            />
          <div class="flex-1 min-w-0" (dblclick)="goToRout(notification)">
            <p class="text-sm font-medium text-gray-900 truncate"  >{{notification.taskName}}</p>
            <p class="text-sm text-gray-500">{{notification.assignedDate | date:"MMM dd, yyyy : HH:mm"}}</p>
          </div>
          <button (click)="markAsRead(notification, $event)" class="text-sm text-blue-600 hover:text-blue-800">
            Mark as read
          </button>
        </div>
