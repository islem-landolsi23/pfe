        <div class="mb-3 bg-white dark:bg-gray-700 rounded-lg shadow p-4 cursor-move hover:shadow-lg transition-shadow">
<div class="flex justify-between items-start mb-2">
  <h3 class="font-medium text-gray-800 dark:text-white">{{message}}</h3>
  <div class="flex gap-2">
    <button class="text-blue-500 hover:text-blue-700">
      <i class="fas fa-pencil-alt"></i>
    </button>
    <button class="text-red-500 hover:text-red-700">
      <i class="fas fa-trash"></i>
    </button>
  </div>
</div>
<p class="text-sm text-gray-600 dark:text-gray-300 mb-2">task.description</p>
<div class="flex flex-wrap gap-2 mb-2">
  <span class="text-xs px-2 py-1 rounded  bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200">
    High
  </span>
  <span class="bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-200 text-xs px-2 py-1 rounded">
    Due: 12/12/2012| date: 13/13/2013
  </span>
</div>
<div class="flex items-center gap-2">
  <img
    [src]="avatar"
    alt="Assignee" class="w-3 h-12 rounded-full" />
  <span class="text-sm text-gray-600 dark:text-gray-300">The Rock</span>
</div>
</div>
